name: Update Holidays Data

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜0時(UTC)
  workflow_dispatch:  # 手動実行も可能

# 1. 書き込み権限を明示的に付与
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 必要に応じて最新の履歴を取得
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run conversion script
        run: node convert.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update holidays data"
          title: "Update holidays data"
          branch: auto-update/holidays
          delete-branch: true
