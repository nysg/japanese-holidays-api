name: Update Holidays Data

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜0時(UTC)
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: node convert.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update holidays data"
          title: "Update holidays data"
          branch: auto-update/holidays
          delete-branch: true
